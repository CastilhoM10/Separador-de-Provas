<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Separador e Impressor de Provas</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<link rel="stylesheet" href="css/style.css">


</head>

<body>

<div class="container">
  <h1>📄 PrintFlow</h1>
  <div class="subtitle">Separar e imprimir provas automaticamente</div>

  <label class="file-upload">
  <input type="file" id="pdfFile" accept="application/pdf">
  <span id="fileLabel">📂 Selecionar PDF</span>
</label>
  <input type="number" id="pagesPerSplit" placeholder="Páginas por prova (ex: 4)">

  <button onclick="processarPDF()">Separar e Iniciar</button>
  <button class="secondary" onclick="proximaManual()">Próxima Prova</button>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
